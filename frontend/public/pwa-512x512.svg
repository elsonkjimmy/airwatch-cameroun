<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2342"/>
      <stop offset="100%" style="stop-color:#0D7377"/>
    </linearGradient>
    <linearGradient id="cloud512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f7fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg512)"/>
  
  <!-- Cloud shape -->
  <g transform="translate(80, 120)">
    <!-- Main cloud -->
    <ellipse cx="176" cy="160" rx="120" ry="80" fill="url(#cloud512)"/>
    <ellipse cx="106" cy="173" rx="80" ry="59" fill="url(#cloud512)"/>
    <ellipse cx="253" cy="173" rx="75" ry="53" fill="url(#cloud512)"/>
    <ellipse cx="176" cy="200" rx="133" ry="48" fill="url(#cloud512)"/>
    
    <!-- Sun rays -->
    <circle cx="280" cy="67" r="53" fill="#FFD54F"/>
    <g stroke="#FFD54F" stroke-width="8" stroke-linecap="round">
      <line x1="280" y1="0" x2="280" y2="-21"/>
      <line x1="333" y1="13" x2="349" y2="-3"/>
      <line x1="347" y1="67" x2="368" y2="67"/>
      <line x1="333" y1="120" x2="349" y2="136"/>
    </g>
  </g>
  
  <!-- AQI indicator dot -->
  <circle cx="400" cy="120" r="32" fill="#14A44D" stroke="#fff" stroke-width="8"/>
  
  <!-- "AirWatch" text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#ffffff">AirWatch</text>
  <text x="256" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#81D4D8">Cameroun</text>
</svg>
