<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2342"/>
      <stop offset="100%" style="stop-color:#0D7377"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f7fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  
  <!-- Cloud shape -->
  <g transform="translate(30, 50)">
    <!-- Main cloud -->
    <ellipse cx="66" cy="60" rx="45" ry="30" fill="url(#cloud)"/>
    <ellipse cx="40" cy="65" rx="30" ry="22" fill="url(#cloud)"/>
    <ellipse cx="95" cy="65" rx="28" ry="20" fill="url(#cloud)"/>
    <ellipse cx="66" cy="75" rx="50" ry="18" fill="url(#cloud)"/>
    
    <!-- Sun rays -->
    <circle cx="105" cy="25" r="20" fill="#FFD54F"/>
    <g stroke="#FFD54F" stroke-width="3" stroke-linecap="round">
      <line x1="105" y1="0" x2="105" y2="-8"/>
      <line x1="125" y1="5" x2="131" y2="-1"/>
      <line x1="130" y1="25" x2="138" y2="25"/>
      <line x1="125" y1="45" x2="131" y2="51"/>
    </g>
  </g>
  
  <!-- AQI indicator dot -->
  <circle cx="150" cy="45" r="12" fill="#14A44D" stroke="#fff" stroke-width="3"/>
  
  <!-- "CM" text -->
  <text x="96" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#81D4D8">CM</text>
</svg>
